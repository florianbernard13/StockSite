# docker-compose.yml
services:
  flask-app:
    build: .
    ports:
      - "${APP_PORT}:${APP_PORT}"
      - "${VITE_PORT}:${VITE_PORT}"
    volumes:
      - .:/app
    command: /app/entrypoint.sh

  # Service de la base de données de l'application
  stock-db:
    image: timescale/timescaledb:latest-pg17
    container_name: stock_db
    environment:
      POSTGRES_USER: ${STOCK_DB_USER}
      POSTGRES_PASSWORD: ${STOCK_DB_PASSWORD}
      POSTGRES_DB: ${STOCK_DB_NAME}
    ports:
      - "5433:${STOCK_DB_PORT}"
    volumes:
      - stock_db_data:/var/lib/postgresql/data

  # Service de la base de données SonarQube
  sonardb:
    image: postgres:13
    container_name: sonarqube_db
    environment:
      POSTGRES_USER: ${SONAR_DB_USER}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD}
      POSTGRES_DB: ${SONAR_DB_NAME}
    volumes:
      - sonar_db_data:/var/lib/postgresql/data

  # Service SonarQube
  sonarqube:
    image: sonarqube:lts
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: ${SONARQUBE_JDBC_URL}
      SONAR_JDBC_USERNAME: ${SONARQUBE_JDBC_USERNAME}
      SONAR_JDBC_PASSWORD: ${SONARQUBE_JDBC_PASSWORD}
    depends_on:
      - sonardb
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions

volumes:
  node_modules:
  sonar_db_data:
  sonar_data:
  sonar_extensions:
  stock_db_data: