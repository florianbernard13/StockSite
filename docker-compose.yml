# docker-compose.yml
services:
  flask-app:
    build: .
    ports:
      - "5000:5000"
      - "5173:5173"
    volumes:
      - .:/app
    environment:
      - FLASK_APP=app.py
      - FLASK_RUN_HOST=0.0.0.0  
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - VITE_ENV=development
    command: /app/entrypoint.sh

  # Service de la base de données de l'application
  stock-db:
    image: timescale/timescaledb:latest-pg17
    container_name: stock_db
    environment:
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: stock
      POSTGRES_DB: stock
    ports:
      - "5433:5432"
    volumes:
      - stock_db_data:/var/lib/postgresql/data

  # Service de la base de données SonarQube
  sonardb:
    image: postgres:13
    container_name: sonarqube_db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data

  # Service SonarQube
  sonarqube:
    image: sonarqube:lts
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonardb:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    depends_on:
      - sonardb
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions

volumes:
  node_modules:
  sonar_db_data:
  sonar_data:
  sonar_extensions:
  stock_db_data: